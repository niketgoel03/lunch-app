<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Office Lunch Orders</title>
<style>
  :root { --bg:#f5f6f8; --card:#fff; --line:#e3e6ea; --ink:#1f2733; --muted:#6b7480; --accent:#2f6df0; --ok:#16a34a; --warn:#d97706; --bad:#dc2626; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { background:var(--ink); color:#fff; padding:12px 18px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:17px; margin:0; }
  header .who { font-size:13px; opacity:.85; }
  main { max-width:820px; margin:18px auto; padding:0 14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
  h2 { font-size:16px; margin:0 0 12px; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  input, select { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
  button { cursor:pointer; border:0; border-radius:8px; padding:9px 14px; font-size:14px; background:var(--accent); color:#fff; }
  button.ghost { background:#eef1f6; color:var(--ink); }
  button.danger { background:var(--bad); }
  button.small { padding:5px 9px; font-size:13px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:8px; align-items:center; }
  .tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .tabs button { background:#e9edf3; color:var(--ink); }
  .tabs button.active { background:var(--accent); color:#fff; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); }
  .pill { display:inline-block; padding:2px 9px; border-radius:99px; font-size:12px; }
  .pill.open { background:#e7f6ec; color:var(--ok); } .pill.closed { background:#fdeaea; color:var(--bad); }
  .pill.paid { background:#e7f6ec; color:var(--ok); } .pill.due { background:#fef3e2; color:var(--warn); }
  .msg { padding:9px 12px; border-radius:8px; margin:10px 0; font-size:14px; }
  .msg.err { background:#fdeaea; color:var(--bad); } .msg.ok { background:#e7f6ec; color:var(--ok); } .msg.info { background:#eaf0fd; color:var(--accent); }
  .muted { color:var(--muted); font-size:13px; }
  .item-line { display:grid; grid-template-columns: 1fr 70px 90px 34px; gap:8px; margin-bottom:6px; align-items:center; }
  .totbar { font-weight:600; }
  .hidden { display:none; }
</style>
</head>
<body>
<header>
  <h1>🍱 Office Lunch Orders</h1>
  <div class="row"><span class="who" id="who"></span><button class="ghost small hidden" id="logoutBtn">Logout</button></div>
</header>
<main id="app"></main>

<script>
const $ = (s, r=document) => r.querySelector(s);
const api = async (url, opts={}) => {
  const r = await fetch(url, { credentials:'same-origin', headers:{'Content-Type':'application/json'}, ...opts });
  const data = await r.json().catch(()=> ({}));
  if (!r.ok) throw new Error(data.error || ('HTTP '+r.status));
  return data;
};
let ME = null, STATE = null, TAB = 'order';

function fmtMoney(n){ return (STATE?.currency || '') + ' ' + Number(n||0).toFixed(2); }
function msg(text, kind='info'){ return `<div class="msg ${kind}">${text}</div>`; }

// ---------------- Login ----------------
function renderLogin(step='email', email='', note=''){
  $('#who').textContent=''; $('#logoutBtn').classList.add('hidden');
  $('#app').innerHTML = `
    <div class="card" style="max-width:420px;margin:6vh auto;">
      <h2>Sign in</h2>
      <p class="muted">Use your registered office email. We'll send a one-time code.</p>
      <div id="loginMsg">${note}</div>
      ${step==='email' ? `
        <label>Email</label>
        <input id="email" type="email" value="${email}" placeholder="you@office.com" autocomplete="email">
        <div style="margin-top:14px"><button id="sendBtn">Send code</button></div>
      ` : `
        <label>Email</label>
        <input id="email" type="email" value="${email}" disabled>
        <label>6-digit code</label>
        <input id="code" inputmode="numeric" maxlength="6" placeholder="••••••">
        <div class="row" style="margin-top:14px;gap:8px">
          <button id="verifyBtn">Verify & sign in</button>
          <button id="backBtn" class="ghost">Use another email</button>
        </div>`}
    </div>`;
  if (step==='email'){
    $('#sendBtn').onclick = async () => {
      const em = $('#email').value.trim();
      try {
        const r = await api('/api/auth/request-otp', { method:'POST', body: JSON.stringify({ email: em }) });
        let n = msg('If that email is registered, a code has been sent. It expires in 5 minutes.','ok');
        if (r.devCode) n += msg('Dev mode code: <b>'+r.devCode+'</b>','info');
        renderLogin('code', em, n);
      } catch(e){ $('#loginMsg').innerHTML = msg(e.message,'err'); }
    };
  } else {
    $('#verifyBtn').onclick = async () => {
      try {
        await api('/api/auth/verify-otp', { method:'POST', body: JSON.stringify({ email, code: $('#code').value.trim() }) });
        await boot();
      } catch(e){ $('#loginMsg').innerHTML = msg(e.message,'err'); }
    };
    $('#backBtn').onclick = () => renderLogin('email', email);
    $('#code').addEventListener('keydown', e => { if(e.key==='Enter') $('#verifyBtn').click(); });
  }
}

// ---------------- Shell ----------------
function renderShell(){
  $('#who').textContent = `${ME.name||ME.email} · ${ME.role}`;
  $('#logoutBtn').classList.remove('hidden');
  $('#logoutBtn').onclick = async () => { await api('/api/auth/logout',{method:'POST'}); ME=null; renderLogin(); };
  const tabs = [['order','My order']];
  if (ME.role==='office_boy' || ME.role==='admin') tabs.push(['agg','Collection']);
  if (ME.role==='admin') tabs.push(['admin','Admin']);
  const tabHtml = tabs.map(([k,l])=>`<button data-tab="${k}" class="${TAB===k?'active':''}">${l}</button>`).join('');
  $('#app').innerHTML = `<div class="tabs">${tabHtml}</div><div id="view"></div>`;
  $('#app').querySelectorAll('.tabs button').forEach(b => b.onclick = ()=>{ TAB=b.dataset.tab; route(); });
  route();
}
function route(){
  $('#app').querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===TAB));
  if (TAB==='order') return viewOrder();
  if (TAB==='agg') return viewAggregate();
  if (TAB==='admin') return viewAdmin();
}

// ---------------- My order ----------------
let MENU = [], DRAFT = [];
async function viewOrder(){
  const v = $('#view'); v.innerHTML = 'Loading…';
  MENU = await api('/api/menu');
  const { order, state } = await api('/api/orders/mine'); STATE = state;
  DRAFT = order ? order.items.map(i=>({ name:i.name, qty:i.qty, unit_price:i.unit_price, menu_item_id:null })) : [];
  const open = state.isOpen;
  const statusPill = open ? `<span class="pill open">Open · cutoff ${state.cutoffTime}</span>`
                          : `<span class="pill closed">Closed · cutoff ${state.cutoffTime} (${state.timezone})</span>`;
  v.innerHTML = `
    <div class="card">
      <h2>My lunch order ${statusPill}</h2>
      ${order ? msg(`You have an order placed for today (${fmtMoney(order.payment.amount)}). `+(order.payment.paid?'Marked paid.':'Payment pending.'), order.payment.paid?'ok':'info') : ''}
      ${!open ? msg(`Ordering is closed. Requests are only accepted before ${state.cutoffTime}.`,'err') : ''}
      <div id="builder" class="${open?'':'hidden'}">
        <label>Add from menu</label>
        <div class="row">
          <select id="menuSel">${MENU.filter(m=>m.available).map(m=>`<option value="${m.id}">${m.name} — ${fmtMoney(m.price)}</option>`).join('')}</select>
          <button id="addMenu" class="small">Add</button>
        </div>
        ${state.allowCustomItems ? `
        <label>Or add a custom item</label>
        <div class="row">
          <input id="cName" placeholder="Item name">
          <input id="cPrice" type="number" min="0" step="0.5" placeholder="Price" style="max-width:110px">
          <button id="addCustom" class="small ghost">Add</button>
        </div>`:''}
        <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
        <div id="lines"></div>
        <label>Note for office boy (optional)</label>
        <input id="note" maxlength="300" value="${order? (order.note||'') : ''}" placeholder="e.g. less spicy, no onion">
        <div class="row" style="margin-top:14px;justify-content:space-between">
          <span class="totbar" id="tot"></span>
          <span class="row">
            ${order?'<button id="cancelBtn" class="danger small">Cancel order</button>':''}
            <button id="saveBtn">${order?'Update order':'Place order'}</button>
          </span>
        </div>
        <div id="orderMsg"></div>
      </div>
    </div>`;
  if (open){
    $('#addMenu').onclick = () => { const m = MENU.find(x=>x.id==$('#menuSel').value); if(m){ DRAFT.push({name:m.name, qty:1, unit_price:m.price}); renderLines(); } };
    if ($('#addCustom')) $('#addCustom').onclick = () => {
      const n=$('#cName').value.trim(); const p=Number($('#cPrice').value)||0;
      if(n){ DRAFT.push({name:n, qty:1, unit_price:p}); $('#cName').value=''; $('#cPrice').value=''; renderLines(); }
    };
    $('#saveBtn').onclick = saveOrder;
    if ($('#cancelBtn')) $('#cancelBtn').onclick = async () => {
      try { await api('/api/orders/mine',{method:'DELETE'}); viewOrder(); }
      catch(e){ $('#orderMsg').innerHTML = msg(e.message,'err'); }
    };
    renderLines();
  }
}
function renderLines(){
  const el = $('#lines');
  if (!DRAFT.length){ el.innerHTML = '<p class="muted">No items yet. Add from the menu above.</p>'; $('#tot').textContent=''; return; }
  el.innerHTML = DRAFT.map((it,i)=>`
    <div class="item-line">
      <span>${it.name}</span>
      <input type="number" min="1" max="50" value="${it.qty}" data-i="${i}" class="qty">
      <span>${fmtMoney(it.unit_price)}</span>
      <button class="ghost small" data-del="${i}">✕</button>
    </div>`).join('');
  el.querySelectorAll('.qty').forEach(inp => inp.oninput = e => { DRAFT[e.target.dataset.i].qty = Math.max(1, parseInt(e.target.value)||1); updateTot(); });
  el.querySelectorAll('[data-del]').forEach(b => b.onclick = () => { DRAFT.splice(b.dataset.del,1); renderLines(); });
  updateTot();
}
function updateTot(){ const t = DRAFT.reduce((s,i)=>s+i.qty*i.unit_price,0); $('#tot').textContent = 'Total: '+fmtMoney(t); }
async function saveOrder(){
  try {
    const items = DRAFT.map(i=>({ name:i.name, qty:i.qty, price:i.unit_price }));
    await api('/api/orders', { method:'POST', body: JSON.stringify({ items, note: $('#note').value }) });
    $('#orderMsg').innerHTML = msg('Order saved.','ok'); viewOrder();
  } catch(e){ $('#orderMsg').innerHTML = msg(e.message,'err'); }
}

// ---------------- Aggregate / collection ----------------
async function viewAggregate(){
  const v = $('#view'); v.innerHTML='Loading…';
  const d = await api('/api/aggregate'); STATE = d.state;
  const shop = d.shoppingList.map(r=>`<tr><td>${r.name}</td><td>${r.qty}</td><td>${fmtMoney(r.unit_price)}</td><td>${fmtMoney(r.qty*r.unit_price)}</td></tr>`).join('');
  const people = d.perPerson.map(p=>`
    <tr>
      <td>${p.name||p.email}<br><span class="muted">${p.items.map(i=>i.qty+'× '+i.name).join(', ')}${p.note?' · '+p.note:''}</span></td>
      <td>${fmtMoney(p.amount)}</td>
      <td>${p.paid?'<span class="pill paid">Paid</span>':'<span class="pill due">Due</span>'}</td>
      <td><button class="small ${p.paid?'ghost':''}" data-pay="${p.id}" data-paid="${p.paid?0:1}">${p.paid?'Undo':'Mark paid'}</button></td>
    </tr>`).join('');
  v.innerHTML = `
    <div class="card">
      <h2>Shopping list ${d.frozen?'<span class="pill open">Final</span>':'<span class="pill due">Not final until '+d.state.aggregateTime+'</span>'}</h2>
      <table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Subtotal</th></tr></thead><tbody>${shop||'<tr><td colspan=4 class="muted">No orders today.</td></tr>'}</tbody></table>
      <p class="totbar" style="margin-top:10px">Grand total: ${fmtMoney(d.grandTotal)}</p>
    </div>
    <div class="card">
      <h2>Collect payment (${d.perPerson.length} people)</h2>
      <table><thead><tr><th>Person / order</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>${people||'<tr><td colspan=4 class="muted">No orders.</td></tr>'}</tbody></table>
    </div>`;
  v.querySelectorAll('[data-pay]').forEach(b => b.onclick = async () => {
    await api('/api/payments/'+b.dataset.pay+'/paid', { method:'POST', body: JSON.stringify({ paid: Number(b.dataset.paid) }) });
    viewAggregate();
  });
}

// ---------------- Admin ----------------
async function viewAdmin(){
  const v = $('#view'); v.innerHTML='Loading…';
  const [s, menu, users] = await Promise.all([api('/api/settings'), api('/api/menu'), api('/api/users')]);
  v.innerHTML = `
    <div class="card">
      <h2>Settings</h2>
      <div id="setMsg"></div>
      <div class="row" style="gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:150px"><label>Cutoff time (HH:MM)</label><input id="cutoff" value="${s.cutoff_time}"></div>
        <div style="flex:1;min-width:150px"><label>Aggregate time (HH:MM)</label><input id="aggt" value="${s.aggregate_time}"></div>
      </div>
      <div class="row" style="gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:150px"><label>Timezone</label><input id="tz" value="${s.timezone}"></div>
        <div style="flex:1;min-width:120px"><label>Currency</label><input id="cur" value="${s.currency}"></div>
      </div>
      <label class="row" style="gap:8px;margin-top:12px"><input type="checkbox" id="custom" ${s.allow_custom_items?'checked':''} style="width:auto"> Allow custom (off-menu) items</label>
      <label class="row" style="gap:8px"><input type="checkbox" id="openchk" ${s.ordering_open?'checked':''} style="width:auto"> Ordering enabled (master switch)</label>
      <div style="margin-top:12px"><button id="saveSet">Save settings</button></div>
    </div>
    <div class="card">
      <h2>Menu</h2>
      <div id="menuList"></div>
      <div class="row" style="margin-top:10px"><input id="mName" placeholder="New item name"><input id="mPrice" type="number" min="0" step="0.5" placeholder="Price" style="max-width:110px"><button id="addM" class="small">Add</button></div>
    </div>
    <div class="card">
      <h2>People</h2>
      <div id="userList"></div>
      <div class="row" style="margin-top:10px;flex-wrap:wrap">
        <input id="uName" placeholder="Name" style="min-width:120px">
        <input id="uEmail" placeholder="email@office.com" style="min-width:160px">
        <select id="uRole" style="max-width:140px"><option value="staff">staff</option><option value="office_boy">office_boy</option><option value="admin">admin</option></select>
        <button id="addU" class="small">Add</button>
      </div>
      <p class="muted">Only people listed here can request a login code.</p>
    </div>`;

  $('#saveSet').onclick = async () => {
    try {
      await api('/api/settings',{method:'PUT',body:JSON.stringify({
        cutoff_time:$('#cutoff').value.trim(), aggregate_time:$('#aggt').value.trim(),
        timezone:$('#tz').value.trim(), currency:$('#cur').value.trim(),
        allow_custom_items:$('#custom').checked, ordering_open:$('#openchk').checked })});
      $('#setMsg').innerHTML = msg('Saved.','ok');
    } catch(e){ $('#setMsg').innerHTML = msg(e.message,'err'); }
  };

  const renderMenu = (list) => { $('#menuList').innerHTML = list.map(m=>`
    <div class="item-line" style="grid-template-columns:1fr 90px 90px 70px">
      <span>${m.name}</span><span>${fmtMoney(m.price)}</span>
      <span>${m.available?'available':'<span class="muted">hidden</span>'}</span>
      <span class="row"><button class="small ghost" data-tog="${m.id}" data-av="${m.available?0:1}">${m.available?'Hide':'Show'}</button><button class="small danger" data-delm="${m.id}">✕</button></span>
    </div>`).join('') || '<p class="muted">No items.</p>';
    $('#menuList').querySelectorAll('[data-delm]').forEach(b=>b.onclick=async()=>{ await api('/api/menu/'+b.dataset.delm,{method:'DELETE'}); viewAdmin(); });
    $('#menuList').querySelectorAll('[data-tog]').forEach(b=>b.onclick=async()=>{ await api('/api/menu/'+b.dataset.tog,{method:'PUT',body:JSON.stringify({available:Number(b.dataset.av)})}); viewAdmin(); });
  };
  renderMenu(menu);
  $('#addM').onclick = async () => {
    const n=$('#mName').value.trim(); if(!n) return;
    await api('/api/menu',{method:'POST',body:JSON.stringify({name:n, price:Number($('#mPrice').value)||0})}); viewAdmin();
  };

  $('#userList').innerHTML = users.map(u=>`
    <div class="item-line" style="grid-template-columns:1fr 1fr 100px 90px">
      <span>${u.name||'—'}</span><span class="muted">${u.email}</span>
      <select data-role="${u.id}">${['staff','office_boy','admin'].map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select>
      <button class="small ${u.active?'ghost':''}" data-act="${u.id}" data-a="${u.active?0:1}">${u.active?'Disable':'Enable'}</button>
    </div>`).join('');
  $('#userList').querySelectorAll('[data-role]').forEach(sel=>sel.onchange=async()=>{ await api('/api/users/'+sel.dataset.role,{method:'PUT',body:JSON.stringify({role:sel.value})}); });
  $('#userList').querySelectorAll('[data-act]').forEach(b=>b.onclick=async()=>{ await api('/api/users/'+b.dataset.act,{method:'PUT',body:JSON.stringify({active:Number(b.dataset.a)})}); viewAdmin(); });
  $('#addU').onclick = async () => {
    try { await api('/api/users',{method:'POST',body:JSON.stringify({name:$('#uName').value.trim(), email:$('#uEmail').value.trim(), role:$('#uRole').value})}); viewAdmin(); }
    catch(e){ alert(e.message); }
  };
}

// ---------------- Boot ----------------
async function boot(){
  try { const d = await api('/api/me'); ME = d.user; STATE = d.state; renderShell(); }
  catch { renderLogin(); }
}
boot();
</script>
</body>
</html>
